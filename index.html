<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Novel Shelf</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Web小説リーダー</p>
        <h1>Novel Shelf</h1>
      </div>
      <button class="icon-button" id="themeToggle" type="button" aria-label="テーマ切替" title="テーマ切替">
        <span id="themeIcon">☾</span>
      </button>
    </header>

    <main class="app-shell">
      <nav class="tab-nav" aria-label="メイン">
        <button class="tab-button is-active" type="button" data-view="library">本棚</button>
        <button class="tab-button" type="button" data-view="updates">更新</button>
        <button class="tab-button" type="button" data-view="ranking">ランキング</button>
        <button class="tab-button" type="button" data-view="settings">設定</button>
      </nav>

      <aside class="ad-slot" aria-label="広告枠">広告枠</aside>

      <section class="view is-active" id="libraryView" data-view-panel="library">
        <div class="section-head">
          <div>
            <h2>本棚</h2>
            <p>お気に入り、読了位置、更新状態を端末内に保存します。</p>
          </div>
          <button class="primary-button" id="openAddForm" type="button">追加</button>
        </div>

        <form class="novel-form is-hidden" id="novelForm">
          <input type="hidden" id="novelId" />
          <label>
            作品名
            <input id="novelTitle" type="text" autocomplete="off" required placeholder="例：転生したら..." />
          </label>
          <label>
            サイト
            <select id="novelSite" required>
              <option value="小説家になろう">小説家になろう</option>
              <option value="カクヨム">カクヨム</option>
              <option value="ハーメルン">ハーメルン</option>
              <option value="Arcadia">Arcadia</option>
              <option value="暁">暁</option>
              <option value="ノベルアップ+">ノベルアップ+</option>
              <option value="pixiv小説">pixiv小説</option>
              <option value="ノクターン">ノクターン</option>
              <option value="その他">その他</option>
            </select>
          </label>
          <label>
            URL
            <input id="novelUrl" type="url" placeholder="https://..." />
          </label>
          <div class="form-grid">
            <label>
              最新話
              <input id="novelLatest" type="text" placeholder="第12話" />
            </label>
            <label>
              読了位置
              <input id="novelPosition" type="text" placeholder="第10話 / 42%" />
            </label>
          </div>
          <label>
            メモ
            <textarea id="novelMemo" rows="3" placeholder="次に読む前の覚え書き"></textarea>
          </label>
          <div class="form-actions">
            <button class="primary-button" type="submit">保存</button>
            <button class="ghost-button" id="cancelEdit" type="button">キャンセル</button>
          </div>
        </form>

        <div class="toolbar">
          <label class="search-box">
            検索
            <input id="librarySearch" type="search" placeholder="作品名・サイト・メモ" />
          </label>
          <select id="siteFilter" aria-label="サイト絞り込み">
            <option value="all">すべて</option>
            <option value="小説家になろう">小説家になろう</option>
            <option value="カクヨム">カクヨム</option>
            <option value="ハーメルン">ハーメルン</option>
            <option value="Arcadia">Arcadia</option>
            <option value="暁">暁</option>
            <option value="ノベルアップ+">ノベルアップ+</option>
            <option value="pixiv小説">pixiv小説</option>
            <option value="ノクターン">ノクターン</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="empty-state is-hidden" id="libraryEmpty">
          作品を追加すると、ここに読書リストが並びます。
        </div>
        <div class="novel-list" id="novelList" aria-live="polite"></div>
      </section>

      <section class="view" id="updatesView" data-view-panel="updates">
        <div class="section-head">
          <div>
            <h2>更新</h2>
            <p>未読扱いの作品を優先表示します。</p>
          </div>
          <button class="ghost-button" id="markAllRead" type="button">全て既読</button>
        </div>
        <div class="empty-state is-hidden" id="updatesEmpty">未読更新はありません。</div>
        <div class="novel-list" id="updatesList"></div>
      </section>

      <section class="view" id="rankingView" data-view-panel="ranking">
        <div class="section-head">
          <div>
            <h2>ランキング検索</h2>
            <p>初期版はサンプルデータ検索です。外部API化しやすい構成にしています。</p>
          </div>
        </div>
        <div class="toolbar">
          <select id="rankingSite" aria-label="ランキングサイト">
            <option value="all">全サイト</option>
            <option value="小説家になろう">小説家になろう</option>
            <option value="カクヨム">カクヨム</option>
            <option value="ハーメルン">ハーメルン</option>
            <option value="Arcadia">Arcadia</option>
            <option value="暁">暁</option>
            <option value="ノベルアップ+">ノベルアップ+</option>
            <option value="pixiv小説">pixiv小説</option>
            <option value="ノクターン">ノクターン</option>
          </select>
          <select id="rankingGenre" aria-label="ジャンル">
            <option value="all">全ジャンル</option>
            <option value="異世界">異世界</option>
            <option value="現代">現代</option>
            <option value="SF">SF</option>
            <option value="二次創作">二次創作</option>
          </select>
          <input id="rankingSearch" type="search" placeholder="キーワード" />
        </div>
        <div class="ranking-list" id="rankingList"></div>
      </section>

      <section class="view" id="settingsView" data-view-panel="settings">
        <div class="section-head">
          <div>
            <h2>設定</h2>
            <p>データはブラウザの localStorage に保存されます。</p>
          </div>
        </div>
        <div class="settings-grid">
          <button class="ghost-button" id="exportData" type="button">JSONを書き出し</button>
          <label class="file-button">
            JSONを読み込み
            <input id="importData" type="file" accept="application/json" />
          </label>
          <button class="danger-button" id="clearData" type="button">全データ削除</button>
        </div>
        <textarea id="exportBox" class="export-box" rows="8" readonly placeholder="書き出したJSONがここに表示されます"></textarea>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
