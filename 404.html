    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QC9VEW0JCH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-QC9VEW0JCH');
    </script>
    <meta name="robots" content="noindex" />
    <title>Novel Shelf - ページを移動しています</title>
    <script>
      (function () {
        var path = window.location.pathname;
        var projectBase = path.indexOf("/novel-reader/") === 0 ? "/novel-reader/" : "/";
        var route = path.slice(projectBase.length).replace(/\/$/, "");
        var hash = route ? "#/" + encodeURIComponent(route.split("/")[0]) : "";
        window.location.replace(projectBase + window.location.search + hash);
      })();
    </script>
  </head>
  <body>
    <p>Novel Shelfを開いています。</p>
    <p><a href="./">トップへ戻る</a></p>
  </body>
